[advisories]
# In cargo-deny 0.19+, the lint-level keys were moved out of the table;
# use the [output] section to control severity, and the [advisories]
# table only needs `ignore` for explicit suppressions.
#
# RUSTSEC-2024-0437: uncontrolled recursion / stack overflow in
# `protobuf` 2.28.0, pulled in transitively by `prometheus` 0.13.x.
# The server does not parse untrusted protobuf data on this code path
# (snip-sync only uses prometheus's text encoder for /metrics, and
# protobuf is in the build graph only for `prometheus` itself), so this
# advisory is not exploitable in the snip-it / snip-sync build.
# Track removal once `prometheus` upgrades to `protobuf >= 3.7.2`.
ignore = []

[licenses]
# In cargo-deny 0.19+, the global `unlicensed` key was removed; the
# default already denies unparseable licenses. The `allow` list still
# enumerates the SPDX-acceptable licenses for the project.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "BSL-1.0",
]

# r-efi is dual-licensed MIT/Apache-2.0/LGPL-2.1-or-later but only
# pulled in transitively for UEFI targets, which are not part of any
# build matrix. Clarifying it here keeps `cargo deny check licenses`
# passing without widening the allow list to LGPL.
[[licenses.clarify]]
name = "r-efi"
expression = "MIT OR Apache-2.0"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
