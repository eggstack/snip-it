name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: "25.1"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          components: clippy
      - name: Install protoc (Linux)
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-linux-x86_64.zip" -o protoc.zip
          sudo unzip -o protoc.zip -d /usr/local bin/protoc
          rm protoc.zip
          protoc --version
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.profile }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        profile: [dev, release]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-linux-x86_64.zip" -o protoc.zip
          sudo unzip -o protoc.zip -d /usr/local bin/protoc
          rm protoc.zip
          protoc --version

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-osx-x86_64.zip" -o protoc.zip
          sudo unzip -o protoc.zip -d /usr/local bin/protoc
          rm protoc.zip
          protoc --version

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$env:PROTOC_VERSION/protoc-$env:PROTOC_VERSION-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile protoc.zip
          Expand-Archive -Path protoc.zip -DestinationPath protoc-temp -Force
          Copy-Item "protoc-temp\bin\protoc.exe" "C:\protoc.exe" -Force
          Remove-Item protoc.zip -Force
          Remove-Item protoc-temp -Recurse -Force
          & "C:\protoc.exe" --version
          echo "C:\" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.profile }}

      - name: Workspace tests
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo test --release --workspace --all-features -- --test-threads=1
          else
            cargo test --workspace --all-features -- --test-threads=1
          fi

      - name: PTY integration tests
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo test --release --test pty_integration --features test-support -- --test-threads=1
          else
            cargo test --test pty_integration --features test-support -- --test-threads=1
          fi

  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-linux-x86_64.zip" -o protoc.zip
          sudo unzip -o protoc.zip -d /usr/local bin/protoc
          rm protoc.zip

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-osx-x86_64.zip" -o protoc.zip
          sudo unzip -o protoc.zip -d /usr/local bin/protoc
          rm protoc.zip

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$env:PROTOC_VERSION/protoc-$env:PROTOC_VERSION-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile protoc.zip
          Expand-Archive -Path protoc.zip -DestinationPath protoc-temp -Force
          Copy-Item "protoc-temp\bin\protoc.exe" "C:\protoc.exe" -Force
          Remove-Item protoc.zip -Force
          Remove-Item protoc-temp -Recurse -Force
          echo "C:\" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: Swatinem/rust-cache@v2

      - name: Package and install (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cargo package -p snip-it --locked --allow-dirty
          crate_file=$(ls target/package/snip-it-*.crate | head -1)
          unpack_dir=$(mktemp -d)
          tar -xzf "$crate_file" -C "$unpack_dir"
          package_dir=$(find "$unpack_dir" -maxdepth 1 -type d -name 'snip-it-*' | head -1)
          install_root="$RUNNER_TEMP/snp-install"
          cargo install --path "$package_dir" --locked --root "$install_root"
          "$install_root/bin/snp" --version
          "$install_root/bin/snp" --help >/dev/null

      - name: Package and install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cargo package -p snip-it --locked --allow-dirty
          $crate = Get-ChildItem 'target/package/snip-it-*.crate' | Select-Object -First 1
          if (-not $crate) { throw 'snip-it crate archive not found' }
          $unpack = Join-Path $env:RUNNER_TEMP ("snip-it-package-" + [guid]::NewGuid())
          New-Item -ItemType Directory -Path $unpack | Out-Null
          tar -xzf $crate.FullName -C $unpack
          $packageDir = Get-ChildItem $unpack -Directory | Where-Object Name -Like 'snip-it-*' | Select-Object -First 1
          if (-not $packageDir) { throw 'unpacked snip-it package directory not found' }
          $installRoot = Join-Path $env:RUNNER_TEMP 'snp-install'
          cargo install --path $packageDir.FullName --locked --root $installRoot
          $snp = Join-Path $installRoot 'bin/snp.exe'
          & $snp --version
          & $snp --help | Out-Null
