name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: "25.1"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          components: clippy
      - name: Install protoc
        run: bash scripts/ci/install-protoc.sh
        env:
          PROTOC_VERSION: ${{ env.PROTOC_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.profile }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        profile: [dev, release]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"

      - name: Install protoc (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/ci/install-protoc.sh
        env:
          PROTOC_VERSION: ${{ env.PROTOC_VERSION }}

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh -File scripts/ci/install-protoc.ps1 -Version ${{ env.PROTOC_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.profile }}

      - name: Workspace tests
        timeout-minutes: 45
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo test --release --workspace --all-features -- --test-threads=1
          else
            cargo test --workspace --all-features -- --test-threads=1
          fi

      - name: PTY integration tests
        if: runner.os != 'Windows'
        timeout-minutes: 15
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo test --release --test pty_integration --features test-support -- --test-threads=1
          else
            cargo test --test pty_integration --features test-support -- --test-threads=1
          fi

  # Focused release-blocking test suites on all platforms.
  # These run single-threaded to avoid PTY and lock contention.
  release-blocking-tests:
    name: Release-blocking (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"

      - name: Install protoc (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/ci/install-protoc.sh
        env:
          PROTOC_VERSION: ${{ env.PROTOC_VERSION }}

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh -File scripts/ci/install-protoc.ps1 -Version ${{ env.PROTOC_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-blocking

      - name: Transaction crash recovery
        run: cargo test --test transaction_crash_recovery --features test-support -- --test-threads=1

      - name: Restore transactions
        run: cargo test --test restore_transactions --features test-support -- --test-threads=1

      - name: Backup snapshot concurrency
        run: cargo test --test backup_contracts --features test-support -- --test-threads=1

      - name: Execution outcomes
        run: cargo test --test execution_outcomes --features test-support -- --test-threads=1

      - name: Deterministic E2E
        if: runner.os != 'Windows'
        run: cargo test --test deterministic_e2e --features test-support -- --test-threads=1

      - name: Sync contracts
        if: runner.os != 'Windows'
        run: cargo test --test sync_contracts --features test-support -- --test-threads=1

  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"

      - name: Install protoc (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/ci/install-protoc.sh
        env:
          PROTOC_VERSION: ${{ env.PROTOC_VERSION }}

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh -File scripts/ci/install-protoc.ps1 -Version ${{ env.PROTOC_VERSION }}

      - uses: Swatinem/rust-cache@v2

      - name: Package and install (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          cargo package -p snip-it --locked --allow-dirty
          crate_file=$(ls target/package/snip-it-*.crate | head -1)
          unpack_dir=$(mktemp -d)
          tar -xzf "$crate_file" -C "$unpack_dir"
          package_dir=$(find "$unpack_dir" -maxdepth 1 -type d -name 'snip-it-*' | head -1)
          install_root="$RUNNER_TEMP/snp-install"
          cargo install --path "$package_dir" --locked --root "$install_root"
          "$install_root/bin/snp" --version
          "$install_root/bin/snp" --help >/dev/null

      - name: Package and install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cargo package -p snip-it --locked --allow-dirty
          $crate = Get-ChildItem 'target/package/snip-it-*.crate' | Select-Object -First 1
          if (-not $crate) { throw 'snip-it crate archive not found' }
          $unpack = Join-Path $env:RUNNER_TEMP ("snip-it-package-" + [guid]::NewGuid())
          New-Item -ItemType Directory -Path $unpack | Out-Null
          tar -xzf $crate.FullName -C $unpack
          $packageDir = Get-ChildItem $unpack -Directory | Where-Object Name -Like 'snip-it-*' | Select-Object -First 1
          if (-not $packageDir) { throw 'unpacked snip-it package directory not found' }
          $installRoot = Join-Path $env:RUNNER_TEMP 'snp-install'
          cargo install --path $packageDir.FullName --locked --root $installRoot
          $snp = Join-Path $installRoot 'bin/snp.exe'
          & $snp --version
          & $snp --help | Out-Null
