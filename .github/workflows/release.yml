---
name: Release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  publish-crates:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Release (${{ matrix.target }})
    needs: publish-crates
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: snip-it-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_name: snip-it-${{ github.ref_name }}-aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: snip-it-${{ github.ref_name }}-aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
            archive_name: snip-it-${{ github.ref_name }}-x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: snip-it-${{ github.ref_name }}-x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          STAGING_DIR=$(mktemp -d)
          cp target/${{ matrix.target }}/release/snp "$STAGING_DIR/"
          cp LICENSE README.md "$STAGING_DIR/"
          cd "$STAGING_DIR"
          tar czf "${GITHUB_WORKSPACE}/${{ matrix.archive_name }}.tar.gz" snp LICENSE README.md
          echo "Archive created: ${{ matrix.archive_name }}.tar.gz"
          ls -la "${{ matrix.archive_name }}.tar.gz"
      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP "staging")
          Copy-Item "target/${{ matrix.target }}/release/snp.exe" $staging
          Copy-Item "LICENSE", "README.md" $staging
          Compress-Archive -Path $staging/* -DestinationPath "${{ matrix.archive_name }}.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}.*

  checksums:
    name: Generate Checksums
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          pattern: snip-it-*
      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          for dir in snip-it-*/; do
            for file in "$dir"*; do
              if [[ -f "$file" && ! "$file" == *.txt ]]; then
                (cd "$dir" && sha256sum "$(basename "$file")") >> SHA256SUMS
              fi
            done
          done
          echo "Generated SHA256SUMS:"
          cat SHA256SUMS
      - name: Upload checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: checksums
          path: artifacts/SHA256SUMS

  create-release:
    name: Create GitHub Release
    needs: [release, checksums]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
          files: |
            artifacts/snip-it-*/snip-it-*
            artifacts/checksums/SHA256SUMS

  docker:
    name: Push Docker Image
    needs: publish-crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: snip-sync/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/snip-sync:latest
            ghcr.io/${{ github.repository }}/snip-sync:${{ github.ref_name }}
