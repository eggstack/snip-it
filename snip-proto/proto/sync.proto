syntax = "proto3";

package snip_proto;

option go_package = "github.com/eggstack/snip-it/snip-proto;snip_proto";

service SnippetSync {
    // Get non-deleted snippets from the selected library. Results are filtered
    // to records with updated_at strictly greater than since.
    rpc GetSnippets (GetSnippetsRequest) returns (SnippetList);
    
    // Push local snippets to the selected library. Invalid snippets are
    // rejected individually and reported in the response.
    rpc PushSnippets (PushSnippetsRequest) returns (PushSnippetsResponse);
    
    // Merge local snippets into the selected library and return changed server
    // records, including deletion tombstones.
    rpc Sync (SyncRequest) returns (SyncResponse);
    
    // Health check
    rpc Health (HealthRequest) returns (HealthResponse);

    // Register a new device/user
    rpc Register (RegisterRequest) returns (RegisterResponse);

    // Library management. Library IDs are scoped to the authenticated account.
    rpc CreateLibrary (CreateLibraryRequest) returns (CreateLibraryResponse);
    rpc ListLibraries (ListLibrariesRequest) returns (ListLibrariesResponse);
    rpc DeleteLibrary (DeleteLibraryRequest) returns (DeleteLibraryResponse);

    // Premade libraries (server-to-client only).
    rpc ListPremadeLibraries (ListPremadeLibrariesRequest) returns (ListPremadeLibrariesResponse);
    rpc GetPremadeLibrary (GetPremadeLibraryRequest) returns (GetPremadeLibraryResponse);
    rpc SearchPremadeLibraries (SearchPremadeLibrariesRequest) returns (SearchPremadeLibrariesResponse);
}

message GetSnippetsRequest {
    // Deprecated compatibility field. New clients should send the API key in
    // the authorization metadata as `Bearer <api-key>`.
    string api_key = 1;
    // Return records updated after this Unix timestamp.
    int64 since = 2;
    // Empty selects the account's default library.
    string library_id = 3;
    // Maximum records to return. Zero selects the server default.
    int32 limit = 4;
    // Number of records to skip for pagination.
    int32 offset = 5;
}

message PushSnippetsRequest {
    // Deprecated compatibility field. Prefer authorization metadata.
    string api_key = 1;
    // Empty selects the account's default library.
    string library_id = 3;
    repeated Snippet snippets = 2;
}

message PushSnippetsResponse {
    bool success = 1;
    string message = 2;
    int32 accepted_count = 3;
    int32 rejected_count = 4;
}

message SyncRequest {
    // Deprecated compatibility field. Prefer authorization metadata.
    string api_key = 1;
    // Local records to merge. Only records newer than last_sync_timestamp are
    // considered for insertion or conflict resolution.
    repeated Snippet local_snippets = 2;
    // Unix timestamp returned by the previous completed sync.
    int64 last_sync_timestamp = 3;
    // Empty selects the account's default library.
    string library_id = 4;
    // Maximum records to return. Zero selects the server default.
    int32 limit = 5;
    // Number of records to skip for pagination.
    int32 offset = 6;
}

message SyncResponse {
    bool success = 1;
    string message = 2;
    repeated Snippet snippets = 3;
    int64 server_timestamp = 4;
    int32 skipped_count = 5;
    repeated string skipped_ids = 6;
    bool has_more = 7;
    int32 total_count = 8;
}

message Snippet {
    // Client-generated stable identifier.
    string id = 1;
    // Plaintext when encrypted is false; empty for encrypted records.
    string description = 2;
    // Plaintext command when encrypted is false; encrypted payload otherwise.
    string command = 3;
    // Plaintext tags when encrypted is false; empty for encrypted records.
    repeated string tags = 4;
    // Unix timestamp when the record was created.
    int64 created_at = 5;
    // Unix timestamp used for last-write-wins conflict resolution.
    int64 updated_at = 6;
    // Client/device identifier used as the deterministic tie-breaker.
    string device_id = 7;
    // Deletion tombstone. Tombstones are returned by Sync, not GetSnippets.
    bool deleted = 8;
    // Indicates that command contains the client-encrypted payload.
    bool encrypted = 9;
}

message SnippetList {
    repeated Snippet snippets = 1;
    int32 total_count = 2;
    bool has_more = 3;
}

message HealthRequest {}

message HealthResponse {
    bool healthy = 1;
    string version = 2;
}

message RegisterRequest {
    string device_id = 1;
}

message RegisterResponse {
    bool success = 1;
    string api_key = 2;
    string message = 3;
    string device_id = 4;
}

message CreateLibraryRequest {
    string api_key = 1;
    string name = 2;
}

message CreateLibraryResponse {
    bool success = 1;
    string library_id = 2;
    string message = 3;
}

message ListLibrariesRequest {
    string api_key = 1;
    int32 limit = 2;
    int32 offset = 3;
}

message ListLibrariesResponse {
    repeated Library libraries = 1;
    int32 total_count = 2;
    bool has_more = 3;
}

message DeleteLibraryRequest {
    string api_key = 1;
    string library_id = 2;
}

message DeleteLibraryResponse {
    bool success = 1;
    string message = 2;
}

message Library {
    string id = 1;
    string name = 2;
    int64 created_at = 3;
    int64 snippet_count = 4;
}

message ListPremadeLibrariesRequest {
    string api_key = 1;
}

message ListPremadeLibrariesResponse {
    repeated PremadeLibrary libraries = 1;
    bool has_more = 2;
    int32 total_count = 3;
}

message PremadeLibrary {
    string name = 1;
    string filename = 2;
    string description = 3;
    int32 snippet_count = 4;
    repeated string tags = 5;
}

message GetPremadeLibraryRequest {
    string api_key = 1;
    string filename = 2;
}

message GetPremadeLibraryResponse {
    bool success = 1;
    string name = 2;
    string content = 3;
    string message = 4;
}

message SearchPremadeLibrariesRequest {
    string api_key = 1;
    string query = 2;
}

message SearchPremadeLibrariesResponse {
    repeated PremadeLibrary libraries = 1;
    int32 total_count = 2;
}
