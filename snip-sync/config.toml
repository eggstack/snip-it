# Snip-Sync Server Configuration
# 
# Configuration priority (highest to lowest):
# 1. Environment variables override all settings
# 2. This config file
# 3. Hardcoded defaults
#
# Config file location: platform config directory (see `snip-sync paths`)
# Or set via CONFIG_PATH environment variable

[server]
# gRPC server host and port
grpc_host = "127.0.0.1"
grpc_port = 50051

# HTTP server host and port (for metrics)
http_host = "127.0.0.1"
http_port = 50050

[server.database]
# Path to SQLite database.
# If omitted, defaults to the platform config directory shown by `snip-sync paths`.
# Uncomment to use a relative path (relative to the working directory):
# path = "snippets.db"

[server.premade]
# Directory containing premade snippet libraries
# If omitted, uses the platform data directory shown by `snip-sync paths`.
# directory = "/path/to/premade-libraries"

[server.limits]
# Maximum length of command field in snippets
max_command_length = 1024
# Maximum length of description field in snippets  
max_description_length = 1024
# Maximum number of tags per snippet
max_tags = 50
# Maximum length of each tag
max_tag_length = 100
# Maximum length of client-generated identifiers
max_id_length = 128
# Maximum length of a device identifier
max_device_id_length = 128
# Maximum length of an API key
max_api_key_length = 512
# Request timeout in seconds
request_timeout_secs = 30
# Maximum encoded gRPC request or response message size
grpc_max_message_size = 4194304

[server.rate_limit]
# Number of requests allowed per minute per API key
requests_per_minute = 120
# Accept forwarded client IPs only when the immediate peer is listed here.
# trusted_proxies = ["127.0.0.1"]
# Persist rate-limit counters across restarts.
# persist = false

[server.metrics]
# Basic auth credentials for metrics endpoint
# REQUIRED: Both must be set to enable the /metrics endpoint
# If either is unset, the metrics endpoint returns 404
# WARNING: Do NOT set these to empty strings — that enables the endpoint with blank credentials
# username = "change-me"
# password = "change-me"

[server.cors]
# Comma-separated list of allowed CORS origins
# Empty string means CORS is disabled (all origins blocked by default)
# Set CORS_ALLOW_ALL=true in the environment for permissive development CORS,
# or list specific origins like "https://example.com".
allowed_origins = ""
