version: '3.8'

services:
  snip-sync:
    build: .
    container_name: snip-sync
    ports:
      - "50051:50051"
      - "50050:50050"
    volumes:
      - ./data:/data
    environment:
      - DATABASE_URL=/data/snippets.db
      - GRPC_HOST=0.0.0.0
      - GRPC_PORT=50051
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=50050
    restart: unless-stopped
