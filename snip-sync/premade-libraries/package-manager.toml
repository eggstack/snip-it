[[Snippets]]
  Description = "Remove package (dnf)"
  Tag = ["package", "dnf"]
  command = "sudo dnf remove <package_name>"

[[Snippets]]
  Description = "Search packages (dnf)"
  Tag = ["package", "dnf"]
  command = "dnf search <keyword>"

[[Snippets]]
  Description = "List updates (dnf)"
  Tag = ["package", "dnf"]
  command = "dnf check-update"

[[Snippets]]
  Description = "Clean dnf cache"
  Tag = ["package", "dnf"]
  command = "sudo dnf clean all"

[[Snippets]]
  Description = "Update (yum)"
  Tag = ["package", "yum"]
  command = "sudo yum update"

[[Snippets]]
  Description = "Install package (yum)"
  Tag = ["package", "yum"]
