# Package Manager - apt, dnf, and yum commands
Description = "Package management commands for Debian/Ubuntu (apt) and RedHat/Fedora (dnf/yum)."

[[Snippets]]
  Description = "Update package lists (apt)"
  Tag = ["package", "apt"]
  command = "sudo apt update"

[[Snippets]]
  Description = "Upgrade all packages (apt)"
  Tag = ["package", "apt"]
  command = "sudo apt upgrade"

[[Snippets]]
  Description = "Full upgrade (apt)"
  Tag = ["package", "apt"]
  command = "sudo apt full-upgrade"

[[Snippets]]
  Description = "Install package (apt)"
  Tag = ["package", "apt"]
  command = "sudo apt install <package_name>"

[[Snippets]]
  Description = "Remove package (apt)"
  Tag = ["package", "apt"]
  command = "sudo apt remove <package_name>"

[[Snippets]]
  Description = "Purge package (apt)"
  Tag = ["package", "apt"]
  command = "sudo apt purge <package_name>"

[[Snippets]]
  Description = "Search packages (apt)"
  Tag = ["package", "apt"]
  command = "apt search <keyword>"

[[Snippets]]
  Description = "Show package info (apt)"
  Tag = ["package", "apt"]
  command = "apt show <package_name>"

[[Snippets]]
  Description = "List installed packages"
  Tag = ["package", "apt"]
  command = "dpkg -l"

[[Snippets]]
  Description = "Check if package installed"
  Tag = ["package", "apt"]
  command = "dpkg -l | grep <package_name>"

[[Snippets]]
  Description = "Install .deb file"
  Tag = ["package", "apt"]
  command = "sudo dpkg -i <package>.deb"

[[Snippets]]
  Description = "Fix broken dependencies"
  Tag = ["package", "apt"]
  command = "sudo apt install -f"

[[Snippets]]
  Description = "Clean apt cache"
  Tag = ["package", "apt"]
  command = "sudo apt clean"

[[Snippets]]
  Description = "Remove unused packages"
  Tag = ["package", "apt"]
  command = "sudo apt autoremove"

[[Snippets]]
  Description = "Update (dnf)"
  Tag = ["package", "dnf"]
