[[Snippets]]
  Description = "Vitest watch mode"
  Tag = ["node", "test"]
  command = "vitest"

[[Snippets]]
  Description = "Jest run tests"
  Tag = ["node", "test"]
  command = "jest"

[[Snippets]]
  Description = "Nodemon dev server"
  Tag = ["node", "dev"]
