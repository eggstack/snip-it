# C# / .NET - .NET development commands
Description = "Commands for C# and .NET development, dotnet CLI, and common frameworks."

[[Snippets]]
  Description = "Create new console project"
  Tag = ["csharp", "dotnet"]
  command = "dotnet new console -n <project_name>"

[[Snippets]]
  Description = "Create new web API project"
  Tag = ["csharp", "dotnet"]
  command = "dotnet new webapi -n <project_name>"

[[Snippets]]
  Description = "Create new class library"
  Tag = ["csharp", "dotnet"]
  command = "dotnet new classlib -n <project_name>"

[[Snippets]]
  Description = "Create new Blazor project"
  Tag = ["csharp", "dotnet", "blazor"]
  command = "dotnet new blazorserver -n <project_name>"

[[Snippets]]
  Description = "Create new xUnit test project"
  Tag = ["csharp", "dotnet", "test"]
  command = "dotnet new xunit -n <project_name>"

[[Snippets]]
  Description = "Build project"
  Tag = ["csharp", "dotnet"]
  command = "dotnet build"

[[Snippets]]
  Description = "Build solution"
  Tag = ["csharp", "dotnet"]
  command = "dotnet build <solution>.sln"

[[Snippets]]
  Description = "Build in release mode"
  Tag = ["csharp", "dotnet"]
  command = "dotnet build -c Release"

[[Snippets]]
  Description = "Run project"
  Tag = ["csharp", "dotnet"]
  command = "dotnet run"

[[Snippets]]
  Description = "Run with arguments"
  Tag = ["csharp", "dotnet"]
  command = "dotnet run -- <args>"

[[Snippets]]
  Description = "Run specific project"
  Tag = ["csharp", "dotnet"]
  command = "dotnet run --project <project_dir>"

[[Snippets]]
  Description = "Test project"
  Tag = ["csharp", "dotnet", "test"]
  command = "dotnet test"

[[Snippets]]
  Description = "Test with verbose output"
  Tag = ["csharp", "dotnet", "test"]
  command = "dotnet test --verbosity normal"

[[Snippets]]
  Description = "Test with coverage"
  Tag = ["csharp", "dotnet", "test"]
  command = "dotnet test --collect:'XPlat Code Coverage'"

[[Snippets]]
  Description = "Test specific filter"
  Tag = ["csharp", "dotnet", "test"]
  command = "dotnet test --filter <filter_expression>"

[[Snippets]]
  Description = "Restore NuGet packages"
  Tag = ["csharp", "dotnet"]
  command = "dotnet restore"

[[Snippets]]
  Description = "Add NuGet package"
  Tag = ["csharp", "dotnet"]
  command = "dotnet add <project> package <package_name>"

[[Snippets]]
  Description = "Add project reference"
  Tag = ["csharp", "dotnet"]
  command = "dotnet add <project> reference <reference_project>"

[[Snippets]]
  Description = "List NuGet packages"
  Tag = ["csharp", "dotnet"]
  command = "dotnet list <project> package"

[[Snippets]]
  Description = "Clean build artifacts"
  Tag = ["csharp", "dotnet"]
  command = "dotnet clean"

[[Snippets]]
  Description = "Publish application"
  Tag = ["csharp", "dotnet"]
  command = "dotnet publish -c Release"

[[Snippets]]
  Description = "Publish self-contained"
  Tag = ["csharp", "dotnet"]
  command = "dotnet publish -c Release --self-contained true -r <rid>"

[[Snippets]]
  Description = "Watch and rebuild"
  Tag = ["csharp", "dotnet", "dev"]
