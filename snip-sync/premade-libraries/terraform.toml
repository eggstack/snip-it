# Terraform - Infrastructure as Code commands
Description = "Terraform commands for managing cloud infrastructure as code."

[[Snippets]]
  Description = "Initialize Terraform"
  Tag = ["terraform", "init"]
  command = "terraform init"

[[Snippets]]
  Description = "Plan infrastructure changes"
  Tag = ["terraform", "plan"]
  command = "terraform plan"

[[Snippets]]
  Description = "Apply infrastructure changes"
  Tag = ["terraform", "apply"]
  command = "terraform apply"

[[Snippets]]
  Description = "Apply with auto-approve"
  Tag = ["terraform", "apply"]
  command = "terraform apply -auto-approve"

[[Snippets]]
  Description = "Destroy infrastructure"
  Tag = ["terraform", "destroy"]
  command = "terraform destroy"

[[Snippets]]
  Description = "Show current state"
  Tag = ["terraform", "state"]
  command = "terraform show"

[[Snippets]]
  Description = "List resources in state"
  Tag = ["terraform", "state"]
  command = "terraform state list"

[[Snippets]]
  Description = "Show resource details"
  Tag = ["terraform", "state"]
  command = "terraform state show <resource>"

[[Snippets]]
  Description = "Move resource in state"
  Tag = ["terraform", "state"]
  command = "terraform state mv <source> <destination>"

[[Snippets]]
  Description = "Remove resource from state"
  Tag = ["terraform", "state"]
  command = "terraform state rm <resource>"

[[Snippets]]
  Description = "Import existing resource"
  Tag = ["terraform", "import"]
