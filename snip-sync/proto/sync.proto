syntax = "proto3";

package snip_sync;

service SnippetSync {
    // Get snippets from server (optionally since a timestamp)
    rpc GetSnippets (GetSnippetsRequest) returns (SnippetList);
    
    // Push local snippets to server
    rpc PushSnippets (PushSnippetsRequest) returns (PushSnippetsResponse);
    
    // Two-way sync - merge local and server snippets
    rpc Sync (SyncRequest) returns (SyncResponse);
    
    // Health check
    rpc Health (HealthRequest) returns (HealthResponse);
}

message GetSnippetsRequest {
    string api_key = 1;
    int64 since = 2;  // Unix timestamp, 0 for all
}

message PushSnippetsRequest {
    string api_key = 1;
    repeated Snippet snippets = 2;
}

message PushSnippetsResponse {
    bool success = 1;
    string message = 2;
    int32 accepted_count = 3;
    int32 rejected_count = 4;
}

message SyncRequest {
    string api_key = 1;
    repeated Snippet local_snippets = 2;
    int64 last_sync_timestamp = 3;
}

message SyncResponse {
    bool success = 1;
    string message = 2;
    repeated Snippet snippets = 3;
    int64 server_timestamp = 4;
    repeated SyncConflict conflicts = 5;
}

message SyncConflict {
    Snippet local = 1;
    Snippet server = 2;
    string reason = 3;
}

message Snippet {
    string id = 1;
    string description = 2;
    string command = 3;
    repeated string tags = 4;
    int64 created_at = 5;
    int64 updated_at = 6;
    string device_id = 7;
    bool deleted = 8;  // Soft delete for sync
}

message SnippetList {
    repeated Snippet snippets = 1;
}

message HealthRequest {}

message HealthResponse {
    bool healthy = 1;
    string version = 2;
}
